name: Daily Score Sync (IPL 2026)

on:
  schedule:
    # 7:30 PM IST = 14:00 UTC. Match ends around 18:00 UTC (11:30 PM IST).
    - cron: '0 18 * * *'
    # 3:30 PM IST = 10:00 UTC. Match ends around 14:00 UTC (7:30 PM IST).
    - cron: '0 14 * * *'
  
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync_score:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies (dotenv)
        run: npm install dotenv
        
      - name: Run Score Sync Script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_CRICAPI_KEY: ${{ secrets.NEXT_PUBLIC_CRICAPI_KEY }}
        run: node scripts/sync-scores.js
