name: Supabase DB Backup & Email

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create backup dir
        run: mkdir -p backups

      - name: Dump DB schema and data
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          supabase db dump --file backups/full_backup.sql --db-url "$SUPABASE_DB_URL"

      - name: Zip backup
        run: zip -r db-backup-$(date +%Y%m%d-%H%M%S).zip backups/

      - name: Send email with backup
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 'IPL 2026 DB Backup - $(date +%Y-%m-%d)'
          to: jalan.me4u@gmail.com,harshshah661992@gmail.com,tradingwithparthshah@gmail.com,naisicric97@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: 'Hello Owners,\n\nAttached is the latest automated SQL backup for the IPL 2026 Auction database.\n\nThis includes both schema and data dumps.\n\nDate: $(date +%Y-%m-%d %H:%M:%S) UTC'
          attachments: '*.zip'
