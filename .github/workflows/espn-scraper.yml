name: ESPNcricinfo Scraper

on:
  schedule:
    - cron: "30 13 * * *"
      timezone: "America/Chicago"
  workflow_dispatch:
    inputs:
      date_ist:
        description: "Target IST date (YYYY-MM-DD). Leave blank for yesterday (IST), same as the scheduled run."
        required: false
        default: ""
      match_id:
        description: "Match ID to sync (optional). (Not wired yet)"
        required: false
        default: ""

jobs:
  scrape_and_notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth requests python-dotenv
          # Install system deps + the browser we actually use (Firefox)
          playwright install-deps
          playwright install firefox

      - name: Run Scraper
        id: run_scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Always run headless in CI for stability
          export ESPN_HEADLESS=1
          DATE_ARG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.date_ist }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date_ist }}"
          fi
          python scripts/sync_scorecards_espn.py $DATE_ARG

      - name: Send Success Email
        if: success() && steps.run_scraper.outputs.updated_count != '0'
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME || secrets.SMTP_USER }}
          password: ${{ secrets.MAIL_PASSWORD || secrets.SMTP_PASS }}
          subject: "Points updated for match: ${{ steps.run_scraper.outputs.target_date }} (${{ steps.run_scraper.outputs.updated_count }} updated)"
          to: "naisicric97@gmail.com"
          from: "IPL Auction System <${{ secrets.MAIL_USERNAME || secrets.SMTP_USER || 'noreply@ipl2026.com' }}>"
          body: |
            Hi,

            Points have been updated successfully for the following match(es):

            ${{ steps.run_scraper.outputs.updated_details }}

            Date (IST): ${{ steps.run_scraper.outputs.target_date }}

            IPL Auction System
          
      - name: Send Failure Email (Primary Admin)
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME || secrets.SMTP_USER }}
          password: ${{ secrets.MAIL_PASSWORD || secrets.SMTP_PASS }}
          subject: "ALERT: IPL 2026 Scraper FAILED"
          to: "naisicric97@gmail.com"
          from: "IPL Auction System <${{ secrets.MAIL_USERNAME || secrets.SMTP_USER || 'noreply@ipl2026.com' }}>"
          body: |
            CRITICAL: Match synchronization failed.
            
            Error Summary:
            ${{ steps.run_scraper.outputs.SUMMARY }}
            
            Please check GitHub Actions logs for details.
