name: ESPNcricinfo Scraper

on:
  schedule:
    # 11:55 PM IST = 6:25 PM UTC (Daily)
    - cron: "25 18 * * *"
    # 8:00 PM IST = 2:30 PM UTC (Sat, Sun)
    - cron: "30 14 * * 6,0"
  workflow_dispatch:
    inputs:
      date_ist:
        description: "Target IST date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""
      match_id:
        description: "Match ID to sync (optional). (Not wired yet)"
        required: false
        default: ""

jobs:
  scrape_and_notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth requests python-dotenv
          playwright install-deps
          playwright install chromium

      - name: Run Scraper
        id: run_scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python scripts/sync_scorecards_espn.py \
            ${{ github.event.inputs.date_ist != '' && format('--date {0}', github.event.inputs.date_ist) || '' }}

          echo "SUMMARY=ESPN scorecard sync completed." >> $GITHUB_OUTPUT

      - name: Send Success Email (All Admins)
        if: success()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "IPL 2026: Match Sync Success"
          to: "naisicric97@gmail.com,admin2@example.com,admin3@example.com,admin4@example.com"
          from: "Scraper Intelligence <${{ secrets.SMTP_USER }}>"
          body: |
            Match synchronization was successful!
            
            Details:
            ${{ steps.run_scraper.outputs.SUMMARY }}
            
            Check the app for updated scoreboard.
          
      - name: Send Failure Email (Primary Admin)
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "ALERT: IPL 2026 Scraper FAILED"
          to: "naisicric97@gmail.com"
          from: "Scraper Intelligence <${{ secrets.SMTP_USER }}>"
          body: |
            CRITICAL: Match synchronization failed.
            
            Error Summary:
            ${{ steps.run_scraper.outputs.SUMMARY }}
            
            Please check GitHub Actions logs for details.
